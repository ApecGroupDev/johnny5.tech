<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PULSE 360</title>
<link rel="icon" href="/project-updates/icon-192.png"><link rel="manifest" href="/project-updates/manifest.webmanifest"><meta name="theme-color" content="#0f172a">
<style>
body{margin:0;min-height:100vh;background:#f1f5f9;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#0f172a}
header{background:#0f172a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;margin:0;font-weight:650}header .sp{flex:1}
header a{color:#cbd5e1;font-size:13px;text-decoration:none;cursor:pointer}
.wrap{max-width:760px;margin:34px auto;padding:0 18px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
.tile{display:block;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:22px;text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tile:hover{border-color:#1e3a8a;box-shadow:0 6px 20px rgba(0,0,0,.08)}
.tile h2{margin:0 0 6px;font-size:17px}.tile p{margin:0;color:#64748b;font-size:13px;line-height:1.5}
.tile .ico{font-size:26px}.sub{color:#64748b;font-size:13px}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
.brand{display:flex;align-items:center;overflow:visible;flex:0 0 auto;margin:0}
</style></head><body>
<header><h1 class="brand"><svg viewBox="0 0 160 30" height="26" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PULSE 360"><defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs><rect x="2" y="3" width="24" height="24" rx="6" fill="#0b1220"/><circle cx="14" cy="15" r="8.6" fill="none" stroke="url(#pg)" stroke-width="2"/><path d="M5 15H9.4l1.7-5.4 2.7 10.8 1.8-5.4H23" fill="none" stroke="#e6faff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><text x="33" y="20.5" font-family="Segoe UI,Arial,sans-serif" font-size="16.5" font-weight="800" letter-spacing=".5" fill="currentColor">PULSE<tspan fill="#22d3ee"> 360</tspan></text></svg></h1><span class="sp"></span><a id="logout">Sign out</a></header>
<div class="wrap">
 <div class="sub" id="meta">Loading…</div>
 <div class="cards">
  <a class="tile" href="/project-updates/map.html"><div class="ico">🗺️</div><h2>Project Map</h2><p>Interactive map of every site — status, crew proximity, and 48-hour rain risk. Filter, search, print.</p></a>
  <a class="tile" href="/project-updates/chat.html"><div class="ico">💬</div><h2>Project_Updates</h2><p>Ask about any project: tanks, dispensers, permits, scope progress, latest update, and what's owed.</p></a>
 </div>
</div>
<script>
fetch('/api/project-updates/projects',{credentials:'same-origin'}).then(r=>{if(r.status===401){window.top.location.href='/login?callbackUrl=/apps/project-updates';return null;}return r.json();})
 .then(j=>{if(!j)return;document.getElementById('meta').textContent=j.projects.length+' projects · data as of '+(j.generated||'—');});
document.getElementById('logout').onclick=async()=>{await fetch('/api/auth/signout',{method:'POST'});window.top.location.href='/login';};
</script><script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/project-updates/sw.js").catch(()=>{});}</script>
</body></html>
