<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PULSE 360 — Project_Updates</title>
<link rel="icon" href="/project-updates/icon-192.png"><link rel="manifest" href="/project-updates/manifest.webmanifest"><meta name="theme-color" content="#0f172a">
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;height:100dvh;display:flex;flex-direction:column;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#0f172a;background:#f1f5f9}
header{background:#0f172a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:15px;margin:0;font-weight:650}header .sp{flex:1}header a{color:#cbd5e1;font-size:13px;text-decoration:none;cursor:pointer}
select{padding:7px 9px;border-radius:8px;border:1px solid #475569;background:#1e293b;color:#fff;font-size:13px;max-width:60vw}
#log{flex:1;overflow-y:auto;padding:18px;max-width:820px;width:100%;margin:0 auto}
.msg{margin:0 0 14px;display:flex}.msg .b{padding:10px 13px;border-radius:12px;font-size:14px;line-height:1.55;white-space:pre-wrap}
.u{justify-content:flex-end}.u .b{background:#1e3a8a;color:#fff;border-bottom-right-radius:3px;max-width:80%}
.a .b{background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:3px;max-width:88%}
.hint{color:#64748b;font-size:13px}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:#e2e8f0;border:0;border-radius:14px;padding:5px 10px;font-size:12px;cursor:pointer}.chip:hover{background:#cbd5e1}
footer{padding:10px;background:#fff;border-top:1px solid #e2e8f0}
.row{max-width:820px;margin:0 auto;display:flex;gap:8px}
#q{flex:1;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
#send{padding:11px 16px;border:0;border-radius:10px;background:#1e3a8a;color:#fff;font-weight:600;cursor:pointer}
#send:disabled{opacity:.5}
.a .b{white-space:normal}
.a .b p{margin:.35em 0}.a .b ul,.a .b ol{margin:.35em 0 .35em 1.1em;padding:0}.a .b li{margin:.15em 0}
.a .b .h{font-weight:700;margin:.5em 0 .2em}.a .b strong{font-weight:700}
.a .b code{background:#f1f5f9;padding:0 4px;border-radius:4px;font-size:13px}
.chips{gap:6px}
@media (max-width:600px){
  header{padding:8px 12px;gap:6px 10px}
  header h1{font-size:14px}
  header label{display:none}
  header a{font-size:12.5px;padding:2px 0}
  #projBox{order:5;flex-basis:100%;margin-top:2px}#projSearch{width:100%;max-width:100%}
  #log{padding:12px}
  .a .b{max-width:94%}.u .b{max-width:90%}
  footer{padding:8px}.row{gap:6px}
  #q{font-size:16px}            /* >=16px prevents iOS zoom-on-focus */
  #send{padding:12px 14px}
}
.iconbtn{padding:10px 11px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;cursor:pointer;font-size:17px;line-height:1}
.iconbtn:hover{background:#f1f5f9}.iconbtn.on{background:#1e3a8a;border-color:#1e3a8a}
.iconbtn.rec{background:#dc2626;border-color:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}
#projBox{position:relative}
#projSearch{padding:7px 9px;border-radius:8px;border:1px solid #475569;background:#1e293b;color:#fff;font-size:13px;width:220px;max-width:55vw}
#projSearch::placeholder{color:#94a3b8}
#projList{position:absolute;top:calc(100% + 4px);left:0;background:#fff;color:#0f172a;border:1px solid #cbd5e1;border-radius:8px;box-shadow:0 8px 22px rgba(0,0,0,.25);max-height:55vh;overflow:auto;display:none;z-index:60;min-width:240px}
#projList .it{padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
#projList .it:hover{background:#eaf3ff}#projList .it small{color:#64748b}
.brand{display:flex;align-items:center;overflow:visible;flex:0 0 auto;margin:0}
</style></head><body>
<header><h1 class="brand"><svg viewBox="0 0 160 30" height="26" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PULSE 360"><defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/></linearGradient></defs><rect x="2" y="3" width="24" height="24" rx="6" fill="#0b1220"/><circle cx="14" cy="15" r="8.6" fill="none" stroke="url(#pg)" stroke-width="2"/><path d="M5 15H9.4l1.7-5.4 2.7 10.8 1.8-5.4H23" fill="none" stroke="#e6faff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><text x="33" y="20.5" font-family="Segoe UI,Arial,sans-serif" font-size="16.5" font-weight="800" letter-spacing=".5" fill="currentColor">PULSE<tspan fill="#22d3ee"> 360</tspan></text></svg></h1><span class="sp"></span>
 <div id="projBox"><input id="projSearch" placeholder="All projects — type to search" autocomplete="off"><div id="projList"></div></div>
 <a id="clearChat">Clear chat</a><a href="/project-updates/index.html">Home</a><a id="logout">Sign out</a></header>
<div id="log">
 <div class="hint">Pick a project above (or stay on Portfolio), then ask a question. Examples:</div>
 <div class="chips" id="chips"></div>
</div>
<footer><div class="row"><button id="mic" class="iconbtn" title="Speak your question">🎤</button><input id="q" placeholder="Ask about this project…" autocomplete="off"><button id="speak" class="iconbtn" title="Read answers aloud (off)">🔈</button><button id="send">Send</button></div></footer>
<script>
const log=document.getElementById('log'),q=document.getElementById('q'),send=document.getElementById('send');
let PROJECTS=[], selProj='';
const psearch=document.getElementById('projSearch'), plist=document.getElementById('projList'), projBox=document.getElementById('projBox');
function renderList(qq){ qq=(qq||'').toLowerCase().trim();
  let base = qq ? PROJECTS.filter(p=>((p.name+' '+(p.company||'')+' '+(p.city||'')).toLowerCase().indexOf(qq)>=0)) : PROJECTS;
  let items=[{id:'',name:'All projects (Portfolio)',company:'',city:''}].concat(base).slice(0,40);
  plist.innerHTML=items.map(p=>'<div class="it" data-id="'+p.id+'">'+p.name+(p.company?(' <small>('+p.company+(p.city?(' · '+p.city):'')+')</small>'):'')+' </div>').join('')||'<div class="it">no match</div>';
  Array.prototype.forEach.call(plist.querySelectorAll('.it[data-id]'),el=>{ el.onclick=()=>{ selProj=el.dataset.id; psearch.value=(selProj===''?'':el.textContent.replace(/\s*\(.*$/,'').trim()); plist.style.display='none'; q.focus(); }; });
  plist.style.display='block';
}
psearch.addEventListener('focus',()=>renderList(psearch.value));
psearch.addEventListener('input',()=>{ selProj=''; renderList(psearch.value); });
psearch.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const f=plist.querySelector('.it[data-id]'); if(f){ f.click(); e.preventDefault(); } } });
document.addEventListener('click',e=>{ if(projBox && !projBox.contains(e.target)) plist.style.display='none'; });
const EX=["What's the status of tanks, dispensers, and permit?","How far along is the scope of work?","What's the most recent progress and the action item?","What does the customer owe us?","Show the terms, collections, and billing."];
EX.forEach(t=>{const b=document.createElement('button');b.className='chip';b.textContent=t;b.onclick=()=>{q.value=t;q.focus();};document.getElementById('chips').appendChild(b);});
fetch('/api/project-updates/projects',{credentials:'same-origin'}).then(r=>{if(r.status===401){window.top.location.href='/login?callbackUrl=/apps/project-updates';return null;}return r.json();})
 .then(j=>{ if(!j) return; PROJECTS=j.projects; });
document.getElementById('logout').onclick=async()=>{await fetch('/api/auth/signout',{method:'POST'});window.top.location.href='/login';};
document.getElementById('clearChat').onclick=()=>{document.querySelectorAll('#log .msg').forEach(m=>m.remove());q.focus();};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inl(s){return s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');}
function md(t){var lines=esc(t).split(/\r?\n/),html='',inUl=false,inOl=false;
 function cl(){if(inUl){html+='</ul>';inUl=false;}if(inOl){html+='</ol>';inOl=false;}}
 for(var i=0;i<lines.length;i++){var l=lines[i].trim();
  if(!l){cl();continue;}
  var h=l.match(/^#{1,6}\s+(.*)$/); if(h){cl();html+='<div class="h">'+inl(h[1])+'</div>';continue;}
  var u=l.match(/^[-*]\s+(.*)$/); if(u){if(!inUl){cl();html+='<ul>';inUl=true;}html+='<li>'+inl(u[1])+'</li>';continue;}
  var o=l.match(/^\d+\.\s+(.*)$/); if(o){if(!inOl){cl();html+='<ol>';inOl=true;}html+='<li>'+inl(o[1])+'</li>';continue;}
  cl();html+='<p>'+inl(l)+'</p>';}
 cl();return html;}
function add(role,text){const d=document.createElement('div');d.className='msg '+(role==='u'?'u':'a');const b=document.createElement('div');b.className='b';b.textContent=text;d.appendChild(b);log.appendChild(d);log.scrollTop=log.scrollHeight;return b;}
async function ask(){const question=q.value.trim();if(!question)return;q.value='';add('u',question);send.disabled=true;const tb=add('a','…thinking');
 try{const r=await fetch('/api/project-updates/chat',{method:'POST',headers:{'content-type':'application/json'},credentials:'same-origin',body:JSON.stringify({projectId:selProj,question})});
  if(r.status===401){window.top.location.href='/login?callbackUrl=/apps/project-updates';return;}
  const j=await r.json(); if(r.ok){tb.innerHTML=md(j.answer||'(no answer)'); if(speakOn&&j.answer)speak(j.answer);} else {tb.textContent='Error: '+(j.error||'failed')+(j.detail?(' — '+j.detail):'');}
 }
 catch(x){tb.textContent='Network error.';}finally{send.disabled=false;q.focus();}}
var speakOn=false;
function speak(t){ try{ speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(String(t).replace(/[#*`>_]/g,'').replace(/\s+/g,' ').trim()); u.lang='en-US'; speechSynthesis.speak(u);}catch(e){} }
var speakBtn=document.getElementById('speak');
if('speechSynthesis' in window){ speakBtn.onclick=function(){ speakOn=!speakOn; speakBtn.classList.toggle('on',speakOn); speakBtn.textContent=speakOn?'🔊':'🔈'; speakBtn.title='Read answers aloud ('+(speakOn?'on':'off')+')'; if(!speakOn)speechSynthesis.cancel(); }; } else { speakBtn.style.display='none'; }
var micBtn=document.getElementById('mic'); var SR=window.SpeechRecognition||window.webkitSpeechRecognition; var rec=null,reccing=false;
if(SR){ rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=function(e){ var t=e.results[0][0].transcript; q.value=t; };
  rec.onerror=function(){ };
  rec.onend=function(){ reccing=false; micBtn.classList.remove('rec'); if(q.value.trim()) ask(); };
  micBtn.onclick=function(){ if(reccing){ try{rec.stop();}catch(e){} return; } try{ q.value=''; reccing=true; micBtn.classList.add('rec'); rec.start(); }catch(e){ reccing=false; micBtn.classList.remove('rec'); } };
} else { micBtn.style.display='none'; }
send.onclick=ask;q.addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
</script><script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/project-updates/sw.js").catch(()=>{});}</script>
</body></html>
